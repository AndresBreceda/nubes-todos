<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EduGestión Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #002045;
            --secondary: #1a365d;
            --surface: #ffffff;
            --on-surface-variant: #64748b;
            --outline-variant: #e2e8f0;
            --radius-lg: 12px;
            --spacing-md: 12px;
            --spacing-lg: 20px;
            --spacing-xl: 32px;
        }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-xl);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }
        .input-group {
            margin-bottom: var(--spacing-md);
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }
        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--outline-variant);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            padding: 12px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-card fade-in">
    <div style="text-align: center; margin-bottom: var(--spacing-xl);">
        <h2 style="font-size: 2rem; color: var(--primary); margin: 0;">EduGestión <span style="color: var(--secondary);">Pro</span></h2>
        <p style="color: var(--on-surface-variant); margin: 4px 0 0 0;">Sistema de Gestión Académica</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; text-align: center; font-weight: 500;">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <div class="input-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" name="username" id="username" class="input-field" placeholder="ej. docente_smith" required>
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); margin-top: var(--spacing-md);">
            <label style="font-size: 13px; display: flex; align-items: center; color: var(--on-surface-variant);">
                <input type="checkbox" style="margin-right: 8px;"> Recordarme
            </label>
            <a href="#" style="font-size: 13px; color: var(--secondary); text-decoration: none; font-weight: 600;">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Ingresar al Sistema</button>
    </form>

    <div style="margin-top: var(--spacing-xl); text-align: center; border-top: 1px solid var(--outline-variant); padding-top: var(--spacing-lg);">
        <p style="font-size: 13px; color: var(--on-surface-variant); margin: 0 0 8px 0;">¿Tienes problemas para ingresar?</p>
        <a href="mailto:soporte@edugestionpro.com" style="color: var(--secondary); text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center;">
            <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">contact_support</span>
            Soporte Técnico
        </a>
    </div>
</div>

</body>
</html>
